; =====================================================================
; AVSEC - PHP-FPM pool configuration (production)
; Loaded as /usr/local/etc/php-fpm.d/zz-www.conf (overrides defaults)
; =====================================================================

[www]
user  = www-data
group = www-data

; Listen on TCP port 9000 (consumed by host nginx via 127.0.0.1:9000)
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Restrict who may connect (the docker bridge gateway hits FPM).
; Empty means allow any; we rely on docker port-mapping (127.0.0.1)
; for network-level isolation.
;listen.allowed_clients = 127.0.0.1

; --- Process manager ---
; Tune these based on container CPU/RAM. Defaults below assume
; ~1 GB RAM available to the app container.
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests      = 500
pm.process_idle_timeout = 30s

; --- Health & status ---
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; --- Logging ---
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; --- Timeouts ---
request_terminate_timeout = 120s
request_slowlog_timeout   = 10s
slowlog = /proc/self/fd/2
