; =====================================================================
; AVSEC - OPcache configuration (production)
; Loaded as /usr/local/etc/php/conf.d/zz-opcache.ini
; =====================================================================

[opcache]
opcache.enable = 1
opcache.enable_cli = 0

; Memory & file count
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000

; Production: never re-validate timestamps; deploys must rebuild image.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Behavior
opcache.fast_shutdown = 1
opcache.save_comments = 1
opcache.huge_code_pages = 0

; JIT (PHP 8+):
; Mode 'tracing' moderate. Aktifkan setelah workload terbukti stabil.
; Untuk awal production yang aman, set ke 'disable' (jit=disable).
opcache.jit_buffer_size = 64M
opcache.jit = tracing
