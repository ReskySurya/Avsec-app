; =====================================================================
; AVSEC - PHP runtime configuration (production)
; Loaded as /usr/local/etc/php/conf.d/zz-app.ini  (overrides defaults)
; =====================================================================

; --- Core ---
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
default_socket_timeout = 60

; --- Uploads (dokumen PMIK, lampiran laporan, dll) ---
file_uploads = On
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

; --- Security ---
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; --- Session hardening ---
; cookie_secure di-atur Laravel via SESSION_SECURE_COOKIE env var
; (jangan paksa di sini supaya smoke test pre-HTTPS tidak kacau).
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1

; --- Error handling (production: no display) ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; --- Locale / timezone ---
date.timezone = Asia/Jakarta

; --- Realpath cache (perf) ---
realpath_cache_size = 4096K
realpath_cache_ttl = 600
